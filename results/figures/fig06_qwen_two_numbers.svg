<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#EFEAE0"/>
    </linearGradient>
    <filter id="sh06">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#C8B89A" flood-opacity="0.20"/>
    </filter>
    <!-- Left panel clip: x=145..435 -->
    <clipPath id="lp"><rect x="145" y="110" width="290" height="380"/></clipPath>
    <!-- Right panel clip: x=465..755 -->
    <clipPath id="rp"><rect x="465" y="110" width="290" height="380"/></clipPath>
  </defs>

  <rect width="900" height="580" fill="url(#bg06)" rx="4"/>

  <!-- Corner-tick frame -->
  <line x1="18" y1="18" x2="42" y2="18" stroke="#2A2823" stroke-width="1.5"/>
  <line x1="18" y1="18" x2="18" y2="42" stroke="#2A2823" stroke-width="1.5"/>
  <line x1="882" y1="18" x2="858" y2="18" stroke="#2A2823" stroke-width="1.5"/>
  <line x1="882" y1="18" x2="882" y2="42" stroke="#2A2823" stroke-width="1.5"/>
  <line x1="18" y1="562" x2="42" y2="562" stroke="#2A2823" stroke-width="1.5"/>
  <line x1="18" y1="562" x2="18" y2="538" stroke="#2A2823" stroke-width="1.5"/>
  <line x1="882" y1="562" x2="858" y2="562" stroke="#2A2823" stroke-width="1.5"/>
  <line x1="882" y1="562" x2="882" y2="538" stroke="#2A2823" stroke-width="1.5"/>

  <text x="36" y="38" font-family="'IBM Plex Mono','JetBrains Mono',monospace" font-size="10" fill="#8A7E6A" letter-spacing="1.5">FIG · 06</text>

  <!-- Title -->
  <text x="450" y="67" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="22" font-weight="700" fill="#2A2823" text-anchor="middle">Qwen: Two Numbers Never Blended</text>
  <text x="450" y="89" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="13" fill="#6A6057" text-anchor="middle">Engage rate (tool_called / total)  ·  Correctness-given-engagement (correct / tool_called)</text>

  <!--
    Two panels separated by a divider at x=450.
    Left  panel: x 145–435, chart area x 165–415, cx of bars: 235, 275, 315, 375 (n=8/12/16/20, gap=40)
    Right panel: x 465–755, chart area x 485–735, same bar cx layout shifted by +320

    Y axis: 0%=440, 100%=155  → 1% = 2.85 px
    Bar width: 32 px, centred on cx
  -->

  <!-- ── LEFT PANEL: Engage rate ──────────────────────────── -->
  <g clip-path="url(#lp)">

    <!-- Panel title -->
    <text x="290" y="122" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="14" font-weight="700" fill="#2A2823" text-anchor="middle">Engage Rate</text>
    <text x="290" y="138" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#6A6057" text-anchor="middle">tool_called / total</text>
    <text x="290" y="152" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#8A7E6A" text-anchor="middle">denominator: 20 runs</text>

    <!-- Y axis -->
    <line x1="165" y1="155" x2="165" y2="440" stroke="#B0A898" stroke-width="1.2"/>
    <line x1="165" y1="440" x2="415" y2="440" stroke="#B0A898" stroke-width="1.2"/>

    <!-- Gridlines -->
    <line x1="165" y1="226" x2="415" y2="226" stroke="#D5CFC5" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="165" y1="298" x2="415" y2="298" stroke="#D5CFC5" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="165" y1="369" x2="415" y2="369" stroke="#D5CFC5" stroke-width="0.8" stroke-dasharray="3,3"/>

    <!-- Y labels -->
    <text x="159" y="159" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">100%</text>
    <text x="159" y="230" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">75%</text>
    <text x="159" y="302" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">50%</text>
    <text x="159" y="373" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">25%</text>
    <text x="159" y="444" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">0%</text>

    <!--
      Bar CX: n=8=225, n=12=275, n=16=325, n=20=385  (bar width 32, gap 8+20)
      Engage rates: 100%, 85%, 95%, 90%
      y = 440 − rate*2.85
        100%→y=155  85%→y=198  95%→y=169  90%→y=184
      Height = 440 − y
    -->

    <!-- n=8  100%  y=155  h=285 -->
    <rect x="209" y="155" width="32" height="285" fill="#2C5F66" filter="url(#sh06)" rx="2"/>
    <text x="225" y="149" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="700" fill="#2C5F66" text-anchor="middle">100%</text>

    <!-- n=12  85%  y=198  h=242 -->
    <rect x="259" y="198" width="32" height="242" fill="#2C5F66" filter="url(#sh06)" rx="2" opacity="0.78"/>
    <text x="275" y="192" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2C5F66" text-anchor="middle">85%</text>

    <!-- n=16  95%  y=169  h=271 -->
    <rect x="309" y="169" width="32" height="271" fill="#2C5F66" filter="url(#sh06)" rx="2" opacity="0.90"/>
    <text x="325" y="163" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2C5F66" text-anchor="middle">95%</text>

    <!-- n=20  90%  y=184  h=256 -->
    <rect x="369" y="184" width="32" height="256" fill="#2C5F66" filter="url(#sh06)" rx="2" opacity="0.84"/>
    <text x="385" y="178" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2C5F66" text-anchor="middle">90%</text>

    <!-- X axis labels -->
    <text x="225" y="458" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2A2823" text-anchor="middle">n=8</text>
    <text x="275" y="458" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2A2823" text-anchor="middle">n=12</text>
    <text x="325" y="458" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2A2823" text-anchor="middle">n=16</text>
    <text x="385" y="458" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2A2823" text-anchor="middle">n=20</text>

    <!-- Denominator note -->
    <text x="225" y="471" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8A7E6A" text-anchor="middle">20/20</text>
    <text x="275" y="471" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8A7E6A" text-anchor="middle">17/20</text>
    <text x="325" y="471" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8A7E6A" text-anchor="middle">19/20</text>
    <text x="385" y="471" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8A7E6A" text-anchor="middle">18/20</text>

    <!-- Refusal annotation at n=12 — inside panel -->
    <rect x="255" y="212" width="72" height="30" fill="#F5F1E8" stroke="#B85450" stroke-width="1" rx="3"/>
    <text x="291" y="225" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="10" fill="#B85450" text-anchor="middle">3 refusals</text>
    <text x="291" y="237" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="10" fill="#B85450" text-anchor="middle">at n=12</text>

  </g>

  <!-- Panel divider -->
  <line x1="450" y1="110" x2="450" y2="490" stroke="#D5CFC5" stroke-width="1.5"/>

  <!-- ── RIGHT PANEL: Correctness-given-engagement ──────────── -->
  <g clip-path="url(#rp)">

    <!-- Panel title -->
    <text x="610" y="122" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="14" font-weight="700" fill="#2A2823" text-anchor="middle">Correctness-Given-Engagement</text>
    <text x="610" y="138" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#6A6057" text-anchor="middle">correct / tool_called</text>
    <text x="610" y="152" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#8A7E6A" text-anchor="middle">denominator: engaged runs only</text>

    <!-- Y axis -->
    <line x1="485" y1="155" x2="485" y2="440" stroke="#B0A898" stroke-width="1.2"/>
    <line x1="485" y1="440" x2="735" y2="440" stroke="#B0A898" stroke-width="1.2"/>

    <!-- Gridlines -->
    <line x1="485" y1="226" x2="735" y2="226" stroke="#D5CFC5" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="485" y1="298" x2="735" y2="298" stroke="#D5CFC5" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="485" y1="369" x2="735" y2="369" stroke="#D5CFC5" stroke-width="0.8" stroke-dasharray="3,3"/>

    <!-- Y labels -->
    <text x="479" y="159" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">100%</text>
    <text x="479" y="230" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">75%</text>
    <text x="479" y="302" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">50%</text>
    <text x="479" y="373" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">25%</text>
    <text x="479" y="444" font-family="'IBM Plex Mono',monospace" font-size="10" fill="#6A6057" text-anchor="end">0%</text>

    <!--
      CGE rates: 95%, 100%, 100%, 100%  (verified from data)
      n=8:  95%→y=440-270.8=169  h=271
      n=12: 100%→y=155           h=285
      n=16: 100%→y=155           h=285
      n=20: 100%→y=155           h=285
      Bar CX: n=8=545, n=12=595, n=16=645, n=20=705
    -->

    <!-- n=8  95%  y=169 -->
    <rect x="529" y="169" width="32" height="271" fill="#7A9070" filter="url(#sh06)" rx="2"/>
    <text x="545" y="163" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7A9070" text-anchor="middle">95%</text>

    <!-- n=12  100%  y=155 — key cell -->
    <rect x="579" y="155" width="32" height="285" fill="#7A9070" filter="url(#sh06)" rx="2"/>
    <text x="595" y="149" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="700" fill="#7A9070" text-anchor="middle">100%</text>

    <!-- n=16  100% -->
    <rect x="629" y="155" width="32" height="285" fill="#7A9070" filter="url(#sh06)" rx="2"/>
    <text x="645" y="149" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7A9070" text-anchor="middle">100%</text>

    <!-- n=20  100% -->
    <rect x="689" y="155" width="32" height="285" fill="#7A9070" filter="url(#sh06)" rx="2"/>
    <text x="705" y="149" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7A9070" text-anchor="middle">100%</text>

    <!-- X axis labels -->
    <text x="545" y="458" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2A2823" text-anchor="middle">n=8</text>
    <text x="595" y="458" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2A2823" text-anchor="middle">n=12</text>
    <text x="645" y="458" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2A2823" text-anchor="middle">n=16</text>
    <text x="705" y="458" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#2A2823" text-anchor="middle">n=20</text>

    <!-- Denominator note (engaged runs) -->
    <text x="545" y="471" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8A7E6A" text-anchor="middle">19/20</text>
    <text x="595" y="471" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8A7E6A" text-anchor="middle">17/17</text>
    <text x="645" y="471" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8A7E6A" text-anchor="middle">19/19</text>
    <text x="705" y="471" font-family="'IBM Plex Mono',monospace" font-size="9" fill="#8A7E6A" text-anchor="middle">18/18</text>

    <!-- n=12 key annotation: 17/17 — inside panel -->
    <rect x="572" y="168" width="88" height="32" fill="#F5F1E8" stroke="#2C5F66" stroke-width="1.2" rx="3"/>
    <text x="616" y="181" font-family="'IBM Plex Mono',monospace" font-size="11" font-weight="700" fill="#2C5F66" text-anchor="middle">17 / 17</text>
    <text x="616" y="194" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="10" fill="#2C5F66" text-anchor="middle">when engaged</text>

  </g>

  <!-- ── TRIVIAL ABLATION STRIP ──────────────────────────────── -->
  <rect x="145" y="487" width="610" height="38" fill="#7A9070" fill-opacity="0.09" stroke="#7A9070" stroke-width="1" rx="4"/>
  <text x="450" y="501" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="12" font-weight="700" fill="#2A2823" text-anchor="middle">Trivial-copy ablation (structured input) — engage rate 100% at all sizes</text>
  <text x="450" y="517" font-family="'IBM Plex Mono',monospace" font-size="11" fill="#7A9070" text-anchor="middle">20/20 · 20/20 · 20/20 · 19/20 correct at n=8/12/16/20 — refusal resolved</text>

  <!-- ── LEGEND ───────────────────────────────────────────────── -->
  <rect x="160" y="538" width="12" height="12" fill="#2C5F66" rx="2"/>
  <text x="177" y="549" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="12" fill="#2A2823">Engage rate (tool_called / total ← 20)</text>
  <rect x="490" y="538" width="12" height="12" fill="#7A9070" rx="2"/>
  <text x="507" y="549" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="12" fill="#2A2823">CGE rate (correct / tool_called ← engaged)</text>

  <!-- Caption -->
  <text x="450" y="571" font-family="'Source Serif Pro','IBM Plex Serif',Georgia,serif" font-size="12" font-style="italic" fill="#4A443C" text-anchor="middle">When Qwen calls the tool it is near-perfect; its only real failure is refusing to call at all, which structured input fixes.</text>
</svg>
